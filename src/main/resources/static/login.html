<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Concurso</title>
</head>
<body>

<h1>Iniciar Sesión</h1>
<p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>

<form id="loginForm">
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Contraseña:</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Iniciar Sesión</button>
</form>

<br>
<div id="resultado"></div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const data = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        fetch('http://localhost:8080/competitors/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                return response.json().then(competitor => {
                    document.getElementById('resultado').innerHTML =
                        '<p style="color:green">Login exitoso. Bienvenido, ' +
                        competitor.name + ' ' + competitor.surname + '!</p>' +
                        '<pre>' + JSON.stringify(competitor, null, 2) + '</pre>';
                });
            } else {
                return response.json().then(err => {
                    document.getElementById('resultado').innerHTML =
                        '<p style="color:red">Error: ' + err.error + '</p>';
                });
            }
        })
        .catch(err => {
            document.getElementById('resultado').innerHTML =
                '<p style="color:red">No se pudo conectar al servidor.</p>';
        });
    });
</script>

</body>
</html>
