# ==========================================
# Configuración de la base de datos SQLite
# ==========================================

# El archivo competitors.db se creará automáticamente en la raíz del proyecto
spring.datasource.url=jdbc:sqlite:competitors.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Dialecto de Hibernate compatible con SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Drop and Create: borra y recrea las tablas al iniciar (igual que el lab original)
# Cambiar a "update" si quieres conservar los datos entre reinicios
spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar las consultas SQL en consola (útil para depuración)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor embebido Tomcat
server.port=8080

# Nombre de la aplicación
spring.application.name=competitors-app
